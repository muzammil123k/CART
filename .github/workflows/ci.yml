name: FastAPI Automated Tests

# 1. When should this run? Every time you push to the main branch.
on:
  push:
    branches: [ "main" ]

jobs:
  test-api:
    # 2. Spin up a fresh Ubuntu Linux server
    runs-on: ubuntu-latest

    steps:
    # 3. Copy your code from GitHub onto the Linux server
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Install Python 3.11
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    # 5. Install your FastAPI dependencies
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 6. Start the FastAPI server in the background (&) and wait 3 seconds
    - name: Start FastAPI Server
      run: |
        uvicorn app:app --host 0.0.0.0 --port 8000 &
        sleep 3 

    # 7. Install Node.js and Newman (so we can run Postman tests)
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        
    - name: Install Newman
      run: npm install -g newman

    # 8. Fire the 50-Round Torture Test at the checkout endpoint!
    - name: Run Newman API Tests
      run: |
        newman run cart_collection.json -e local_env.json -d checkout_tests.csv --folder "Checkout Cart"